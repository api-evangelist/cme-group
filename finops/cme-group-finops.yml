specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: CME Group
providerId: cme-group
publisherName: Chicago Mercantile Exchange Inc.
serviceCategory: Market Data / Exchange Connectivity
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Capital Markets
  - Market Data
  - Derivatives
notes: CME Group invoices market-data customers under fee schedules tied to subscriber counts (professional
  / non-professional), distribution model (display / non-display / derived), and session count for iLink.
  Specific dollar amounts come from PDF fee schedules per program; the meters below capture the typical
  billing surface but are not reconciled against a particular invoice.
description: 'FOCUS-aligned FinOps for CME Group market data and connectivity: monthly subscriber-based
  billing for market data (MDP 3.0), per-dataset purchases for CME DataMine, and per-session billing for
  iLink connectivity. Subscriber reporting and audit obligations apply to market-data licensees.'
sources:
  - https://www.cmegroup.com/market-data/distributors-and-vendors.html
billingModel:
  pricingCategory: Tiered Subscription + Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: CME Group Market Data
  ServiceCategory: Market Data / Exchange Connectivity
  ProviderName: CME Group
  PublisherName: Chicago Mercantile Exchange Inc.
  InvoiceIssuerName: Chicago Mercantile Exchange Inc.
  PricingCategory: Tiered Subscription
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: professional_subscribers
    description: Count of professional market-data subscribers for the period.
    unit: seat-month
    aggregation: max
    dimensions:
      - product
      - distribution_model
  - name: non_professional_subscribers
    description: Count of non-professional market-data subscribers for the period.
    unit: seat-month
    aggregation: max
    dimensions:
      - product
      - distribution_model
  - name: non_display_licenses
    description: Non-display / derived data licenses.
    unit: license-month
    aggregation: max
    dimensions:
      - product
      - business_unit
  - name: ilink_sessions
    description: iLink order-entry sessions allocated.
    unit: session-month
    aggregation: max
    dimensions:
      - environment
  - name: datamine_purchases
    description: One-time CME DataMine dataset purchases.
    unit: dataset
    aggregation: sum
    dimensions:
      - dataset
      - product
principles:
  - name: Visibility
    description: CME requires monthly subscriber reporting from vendors / distributors; reconcile internal
      entitlement systems against the report submitted to CME.
  - name: Allocation
    description: Allocate market-data fees to the trading desk or research team consuming the feed; allocate
      iLink session fees to the order-routing application.
  - name: Optimization
    description: Audit professional vs non-professional classifications, sunset orphan iLink sessions,
      and consolidate distribution agreements to take advantage of enterprise-licensing terms.
  - name: Accountability
    description: Assign a market-data administrator accountable for monthly reporting accuracy; CME audits
      can result in retroactive fees if subscriber counts are under-reported.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
