specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: CME Group
providerId: cme-group
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Capital Markets
  - Derivatives
  - Exchange
  - Market Data
  - Futures
  - Options
notes: CME Group sells market data, reference data, historical data, and connectivity through a structured
  vendor / distributor / direct-customer licensing program (CME DataMine, MDP 3.0 market-data feed, iLink,
  Market Reporting, Smart Stream). Fee schedules exist but require completion of vendor / subscriber license
  agreements and are published as PDFs on cmegroup.com under each program. The structural plans below preserve
  the API Commons structure; specific dollar fees should be reconciled against the relevant CME fee schedule
  PDF.
description: 'CME Group monetizes market data and connectivity through several program lines: real-time
  market data via MDP 3.0 (vendor / distributor / direct-subscriber fees), CME DataMine for historical
  / reference data, iLink for order routing, and Smart Stream / STP services. Fees vary by professional
  vs non-professional, derived vs non-display, internal vs external distribution. Public pricing is published
  as PDF fee schedules per program rather than a single pricing page.'
sources:
  - https://www.cmegroup.com/market-data/distributors-and-vendors.html
  - https://www.cmegroup.com/market-data.html
  - https://www.cmegroup.com/market-data/datamine.html
plans:
  - id: cme-group-market-data-vendor
    name: Market Data — Distributor / Vendor
    type: enterprise
    description: Real-time market data redistributed by an authorized vendor. Subscriber and non-display
      fees apply; see the CME Market Data Fee Schedule.
    entries:
      - label: Vendor / distributor license
        name: vendor_license
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see CME Market Data Fee Schedule
        userMultiplied: false
      - label: Professional subscriber fee
        name: professional_subscriber
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see CME Market Data Fee Schedule
        userMultiplied: true
      - label: Non-professional subscriber fee
        name: non_professional_subscriber
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see CME Market Data Fee Schedule
        userMultiplied: true
      - label: Non-display / derived data fee
        name: non_display_fee
        type: subscription
        metric: license
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see CME Market Data Fee Schedule
        userMultiplied: false
    elements:
      - name: MDP 3.0 real-time market data
      - name: Vendor agreement required
      - name: Subscriber reporting (monthly)
  - id: cme-group-datamine
    name: CME DataMine
    type: usage-based
    description: Historical and reference data on demand via CME DataMine.
    entries:
      - label: Dataset purchase
        name: dataset_purchase
        type: metered
        metric: dataset
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.cmegroup.com/market-data/datamine.html
        userMultiplied: false
    elements:
      - name: Historical tick / book data
      - name: Reference data
      - name: Settlement data
  - id: cme-group-ilink-connectivity
    name: iLink Connectivity
    type: enterprise
    description: Order-routing connectivity to CME Globex via iLink. Fees apply per session / port; see
      the iLink fee schedule.
    entries:
      - label: iLink session
        name: ilink_session
        type: subscription
        metric: session
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see CME iLink Fee Schedule
        userMultiplied: false
    elements:
      - name: Globex order routing
      - name: Session-level connectivity
      - name: Co-location options (additional fees)
maintainers:
